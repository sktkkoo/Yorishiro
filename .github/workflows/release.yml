name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Build and release an existing tag (e.g. v0.4.0). Leave empty to build the current ref without publishing."
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      # 片アーキの失敗が他アーキを巻き添えキャンセルしないようにする。
      # 例：履歴タグ（openssl cross-compile 修正前）を dispatch した場合、x86_64 は
      # 失敗するが arm64 は成功させ、成功分の .dmg だけでリリースを作る。
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          # Intel build cross-compiled on Apple Silicon runners: GitHub no longer
          # reliably assigns macos-13 runners for this account (jobs sit "awaiting a
          # runner" for 24h and time out). tauri/Rust cross-compile to
          # x86_64-apple-darwin, and codesign/notarytool run host-side regardless.
          - runner: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Download private assets from R2
        run: |
          aws s3 cp "s3://$R2_BUCKET/assets.zip" assets.zip --endpoint-url "$R2_ENDPOINT"
          unzip -o assets.zip -d public/
          rm assets.zip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Build and sign
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          CI: "true"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload .dmg
        uses: actions/upload-artifact@v6
        with:
          name: charminal-macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  publish-release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    # !cancelled(): build-macos の一部 arch が失敗しても、成功した arch の成果物で
    # リリースを作る（fail-fast: false と対で機能する）。
    if: ${{ !cancelled() && (github.event.inputs.tag != '' || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      # versioned dmg（charminal_<ver>_<arch>.dmg）に加えて、バージョンレスの安定名
      # コピーを作る。README の `releases/latest/download/<固定名>` 直リンクは、
      # リリース間でファイル名が固定であることが必須なため。
      - name: Stage stable-named assets
        run: |
          mkdir -p release-assets
          cp artifacts/**/*.dmg release-assets/ 2>/dev/null || cp artifacts/*.dmg release-assets/
          cd release-assets
          for f in *aarch64*.dmg; do [ -e "$f" ] && cp "$f" Charminal-Apple-Silicon.dmg; done
          for f in *x64*.dmg; do [ -e "$f" ] && cp "$f" Charminal-Intel.dmg; done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*.dmg
