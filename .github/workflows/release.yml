name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Build and release an existing tag (e.g. v0.4.0). Leave empty to build the current ref without publishing."
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      # 片アーキの失敗が他アーキを巻き添えキャンセルしないようにする。
      # 例：履歴タグ（openssl cross-compile 修正前）を dispatch した場合、x86_64 は
      # 失敗するが arm64 は成功させ、成功分の .dmg だけでリリースを作る。
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          # Intel build cross-compiled on Apple Silicon runners: GitHub no longer
          # reliably assigns macos-13 runners for this account (jobs sit "awaiting a
          # runner" for 24h and time out). tauri/Rust cross-compile to
          # x86_64-apple-darwin, and codesign/notarytool run host-side regardless.
          - runner: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Download private assets from R2
        run: |
          aws s3 cp "s3://$R2_BUCKET/assets.zip" assets.zip --endpoint-url "$R2_ENDPOINT"
          rm -rf .r2-assets
          unzip -oq assets.zip -d .r2-assets
          rm assets.zip
          # The archive wraps everything in a top-level Charminal-assets/ folder.
          # Route it through the same fetch-assets.mjs mapping local dev uses, so
          # animations/ models/ voices/ land where the runtime loads them
          # (public/animations, public/models, bundled-packs/shared/voices).
          # A raw `unzip -d public/` left files under public/Charminal-assets/, so
          # /animations/*.vrma and /models/CLAI.vrm 404'd in the packaged app.
          if [ -d .r2-assets/Charminal-assets ]; then
            ASSET_SRC="$GITHUB_WORKSPACE/.r2-assets/Charminal-assets"
          else
            ASSET_SRC="$GITHUB_WORKSPACE/.r2-assets"
          fi
          YORISHIRO_ASSETS_REQUIRED=1 YORISHIRO_ASSETS_DIR="$ASSET_SRC" node scripts/fetch-assets.mjs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      # tauri.updater.conf.json overlay で createUpdaterArtifacts を CI だけ有効化する。
      # base conf に置くと署名鍵を持たない contributor のローカル `tauri build` が
      # 失敗するため（TAURI_SIGNING_PRIVATE_KEY 必須になる）、意図的に分離している。
      - name: Build and sign
        run: npm run tauri build -- --target ${{ matrix.target }} --config src-tauri/tauri.updater.conf.json
        env:
          CI: "true"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # in-app updater 用のパッケージ署名（Apple codesign とは別系統の minisign）。
          # 鍵は空パスワードで生成している。PASSWORD を明示しないと TTY プロンプトを
          # 出そうとして CI では "Device not configured" で失敗する。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # updater artifact（.app.tar.gz + .sig）は両アーキで同名（yorishiro.app.tar.gz）に
      # なるため、arch を含む名前にリネームしてから artifact 化する。この名前が
      # そのまま Release asset 名になり、latest.json の url が指す。
      - name: Stage updater artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          mkdir -p updater-assets
          cp "$BUNDLE_DIR"/*.app.tar.gz "updater-assets/yorishiro_${{ matrix.arch }}.app.tar.gz"
          cp "$BUNDLE_DIR"/*.app.tar.gz.sig "updater-assets/yorishiro_${{ matrix.arch }}.app.tar.gz.sig"
          ls -la updater-assets

      - name: Upload .dmg
        uses: actions/upload-artifact@v6
        with:
          name: yorishiro-macos-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v6
        with:
          name: yorishiro-updater-${{ matrix.arch }}
          path: updater-assets/*

  publish-release:
    needs: [build-macos]
    runs-on: ubuntu-latest
    # !cancelled(): build-macos の一部 arch が失敗しても、成功した arch の成果物で
    # リリースを作る（fail-fast: false と対で機能する）。
    if: ${{ !cancelled() && (github.event.inputs.tag != '' || startsWith(github.ref, 'refs/tags/v')) }}
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      # versioned dmg（yorishiro_<ver>_<arch>.dmg）に加えて、バージョンレスの安定名
      # コピーを作る。README の `releases/latest/download/<固定名>` 直リンクは、
      # リリース間でファイル名が固定であることが必須なため。
      - name: Stage stable-named assets
        run: |
          mkdir -p release-assets
          cp artifacts/**/*.dmg release-assets/ 2>/dev/null || cp artifacts/*.dmg release-assets/
          cd release-assets
          for f in *aarch64*.dmg; do [ -e "$f" ] && cp "$f" Yorishiro-Apple-Silicon.dmg; done
          for f in *x64*.dmg; do [ -e "$f" ] && cp "$f" Yorishiro-Intel.dmg; done
          ls -la

      # in-app updater（tauri-plugin-updater）が参照する更新 manifest。
      # アプリは releases/latest/download/latest.json を見るため、リリースを
      # publish した瞬間から既存インストールに更新が配信される。
      # 片アーキ失敗時（fail-fast: false）は成功した分だけを manifest に載せる。
      - name: Stage updater artifacts and generate latest.json
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          find artifacts -name '*.app.tar.gz' -exec cp {} release-assets/ \;
          find artifacts -name '*.app.tar.gz.sig' -exec cp {} release-assets/ \;
          SIG_ARM=$(cat release-assets/yorishiro_aarch64.app.tar.gz.sig 2>/dev/null || true)
          SIG_X64=$(cat release-assets/yorishiro_x86_64.app.tar.gz.sig 2>/dev/null || true)
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig_arm "$SIG_ARM" \
            --arg url_arm "$BASE/yorishiro_aarch64.app.tar.gz" \
            --arg sig_x64 "$SIG_X64" \
            --arg url_x64 "$BASE/yorishiro_x86_64.app.tar.gz" \
            '{version: $version, pub_date: $pub_date, platforms: ({}
              + (if $sig_arm != "" then {"darwin-aarch64": {signature: $sig_arm, url: $url_arm}} else {} end)
              + (if $sig_x64 != "" then {"darwin-x86_64": {signature: $sig_x64, url: $url_x64}} else {} end))}' \
            > release-assets/latest.json
          cat release-assets/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.app.tar.gz
            release-assets/latest.json
