name: Bug report
description: Report a reproducible Charminal bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough local context to reproduce the issue without guessing.
  - type: input
    id: version
    attributes:
      label: Charminal version or commit
      placeholder: v0.3.0-alpha or commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5 arm64
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - macOS .dmg
        - source checkout
        - Windows installer
        - other
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Terminal agent
      options:
        - Claude Code
        - Codex
        - Neither starts
        - Not relevant
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Launch Charminal
        2. Open Settings
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste Settings → Health output, relevant pack diagnosis, or last-startup.json.
      render: text
  - type: textarea
    id: safe-mode
    attributes:
      label: Safe mode result
      description: Say whether `CHARMINAL_SAFE_MODE=1` changes the behavior.
  - type: checkboxes
    id: pack
    attributes:
      label: User pack involvement
      options:
        - label: This reproduces with user packs disabled or in safe mode.
        - label: This may involve a user pack under `~/.charminal/packs/`.
