name: Crash report
description: Report a Yorishiro crash or startup failure
title: "[Crash]: "
labels: ["crash"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when Yorishiro shows the crash recovery screen, fails during startup, or only opens in safe mode.
  - type: input
    id: version
    attributes:
      label: Yorishiro version or commit
      placeholder: v0.4.0 or commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.5 arm64
    validations:
      required: true
  - type: textarea
    id: crash-details
    attributes:
      label: Crash recovery error details
      description: Paste the Error details section from the recovery screen if it appears.
      render: text
  - type: textarea
    id: startup-report
    attributes:
      label: ~/.yorishiro/last-startup.json
      description: Paste this file if it exists and may be related.
      render: json
  - type: textarea
    id: safe-mode
    attributes:
      label: Safe mode behavior
      description: What happens when launching with `YORISHIRO_SAFE_MODE=1`?
    validations:
      required: true
  - type: textarea
    id: packs
    attributes:
      label: User packs
      description: List recent changes under `~/.yorishiro/packs/`, or say "none".
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
